<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>{% block title %}Progrify: Empower Your Progress{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='index.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    {% block additional_styles %}{% endblock %}

    <style>
        :root {
            --theme-color: #FF6B6B;
            --theme-light: rgba(255, 107, 107, 0.8);
            --theme-dark: #E55F5F;
            --accent-color: #4ECDC4;
            --text-color: #333333;
            --light-text: #777777;
        }

        .banner {
            background: linear-gradient(135deg, var(--theme-light), var(--theme-dark));
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
            min-height: 80px;
            box-sizing: border-box;
            flex-wrap: wrap;
            gap: 1rem;
            overflow: hidden;
        }

        .banner::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0%,
                rgba(255, 255, 255, 0.2) 20%,
                rgba(255, 255, 255, 0.2) 80%,
                rgba(255, 255, 255, 0) 100%
            );
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .banner-branding {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .banner-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: white;
            margin: 0;
            line-height: 1.3;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .banner-subtitle {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.9);
            font-weight: 400;
            margin-top: 0.25rem;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        .banner-actions {
            display: flex;
            align-items: center;
            flex: 1;
            justify-content: flex-end;
            gap: 15px;
            position: relative;
            z-index: 1;
        }

        .back-home-btn {
            padding: 0.5rem 1rem;
            background-color: rgba(255,255,255,0.2);
            color: white;
            border-radius: 2rem;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
            font-size: 0.9rem;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(5px);
        }

        .back-home-btn:hover {
            background-color: rgba(255,255,255,0.3);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        @media (max-width: 768px) {
            .banner {
                padding: 0.75rem;
                min-height: 70px;
                flex-direction: column;
                align-items: flex-start;
            }

            .banner-branding {
                margin-bottom: 0.5rem;
                text-align: center;
                width: 100%;
            }

            .banner-title {
                font-size: 1.2rem;
            }

            .banner-subtitle {
                font-size: 0.6rem;
            }

            .banner-actions {
                width: 100%;
                justify-content: center;
            }

            .back-home-btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            .banner {
                padding: 0.5rem;
                min-height: 60px;
            }

            .banner-title {
                font-size: 1.1rem;
            }

            .banner-subtitle {
                font-size: 0.55rem;
            }

            .back-home-btn {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
            }
        }

        .content {
            padding: 1.5rem 1rem;
            margin: 0 auto;
            width: 95%;
            max-width: 1200px;
        }

        @media (max-width: 768px) {
            .content {
                padding: 1rem 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .content {
                padding: 0.75rem 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="banner-branding">
            <div class="banner-title">
                <i class="fas fa-rocket"></i> Progrify: Empower Your Progress
            </div>
            <div class="banner-subtitle">Powered by TIRON</div>
        </div>
        <div class="banner-actions">
            {% if request.endpoint != 'index' %}
            <a href="{{ url_for('index') }}" class="back-home-btn">
                <i class="fas fa-home"></i> Home
            </a>
            {% endif %}
        </div>
    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
